<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Neutrals — cream, sand, browns" subtitle="Page, surface, text" viewport="700x150" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0;background:var(--bg-page);}
.wrap{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;padding:20px 24px;}
.sw{border-radius:12px;height:72px;border:1px solid var(--border-default);display:flex;align-items:flex-end;padding:8px;box-sizing:border-box;}
.sw span{font-size:11px;font-variant-numeric:tabular-nums;}
.cap{grid-column:1/-1;display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.cap div{font-size:11.5px;color:var(--text-body);}
</style></head><body><div class="wrap">
  <div class="sw" style="background:var(--color-cream);"><span style="color:var(--text-body);">#F7F4EF</span></div>
  <div class="sw" style="background:var(--color-sand);"><span style="color:var(--text-body);">#E8DCC8</span></div>
  <div class="sw" style="background:var(--color-sand-hover);"><span style="color:var(--text-body);">#E0D2B9</span></div>
  <div class="sw" style="background:var(--color-border);"><span style="color:var(--text-body);">#D4C9B8</span></div>
  <div class="sw" style="background:var(--color-brown);"><span style="color:var(--color-cream);">#6B5B4E</span></div>
  <div class="sw" style="background:var(--color-ink);"><span style="color:var(--color-cream);">#2D2D2D</span></div>
  <div class="cap"><div>Cream — page bg</div><div>Sand — cards, inputs</div><div>Sand hover</div><div>Border</div><div>Brown — body text</div><div>Ink — high contrast</div></div>
</div></body></html>
