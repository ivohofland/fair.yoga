<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="4px grid" subtitle="4 · 8 · 12 · 16 · 20 · 24 · 32 · 40 · 48" viewport="700x150" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0;background:var(--bg-page);}
.wrap{padding:24px;display:flex;align-items:flex-end;gap:16px;}
.step{display:flex;flex-direction:column;align-items:center;gap:6px;}
.bar{width:24px;background:var(--color-teal);border-radius:4px;}
.step span{font-size:12px;color:var(--text-body);font-variant-numeric:tabular-nums;}
</style></head><body><div class="wrap">
  <div class="step"><div class="bar" style="height:4px;"></div><span>4</span></div>
  <div class="step"><div class="bar" style="height:8px;"></div><span>8</span></div>
  <div class="step"><div class="bar" style="height:12px;"></div><span>12</span></div>
  <div class="step"><div class="bar" style="height:16px;"></div><span>16</span></div>
  <div class="step"><div class="bar" style="height:20px;"></div><span>20</span></div>
  <div class="step"><div class="bar" style="height:24px;"></div><span>24</span></div>
  <div class="step"><div class="bar" style="height:32px;"></div><span>32</span></div>
  <div class="step"><div class="bar" style="height:40px;"></div><span>40</span></div>
  <div class="step"><div class="bar" style="height:48px;"></div><span>48</span></div>
  <div class="type-caption" style="margin-left:16px;max-width:220px;">Page margins 16 / 24 · card padding 20 · cards 12 apart · sections 32 apart</div>
</div></body></html>
