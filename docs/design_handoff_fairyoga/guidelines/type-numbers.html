<!DOCTYPE html>
<!-- @dsCard group="Type" name="Numbers & prices" subtitle="Sans semibold, tabular figures, teal; decimals align" viewport="700x170" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0;background:var(--bg-page);}
.wrap{padding:20px 24px;display:flex;gap:48px;align-items:flex-start;}
table{border-collapse:collapse;}
td,th{padding:4px 0;font-size:16px;}
th{font-size:12px;color:var(--text-muted);font-weight:500;text-align:left;padding-right:32px;}
td.n{text-align:right;}
</style></head><body><div class="wrap">
  <div>
    <div class="type-display" style="font-family:var(--font-body);font-weight:600;font-variant-numeric:tabular-nums;">€92.40</div>
    <div class="type-caption">teacher earnings — Display slot, sans semibold</div>
  </div>
  <table>
    <tr><th>TIER</th><th style="text-align:right;">PRICE</th></tr>
    <tr><td style="color:var(--text-body);">Tier 1</td><td class="n type-number">€8.00</td></tr>
    <tr><td style="color:var(--text-body);">Tier 3</td><td class="n type-number">€12.50</td></tr>
    <tr><td style="color:var(--text-body);">Tier 5</td><td class="n type-number">€17.00</td></tr>
  </table>
  <div class="type-body" style="max-width:200px;">Ranges use an en-dash:<br><span class="type-number">€15.00 – €25.00</span><br><span class="type-caption">Highest pays 2.1× the lowest.</span></div>
</div></body></html>
