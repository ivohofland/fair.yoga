<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Primary — teal steps" subtitle="Teal, hover, pressed, tint" viewport="700x150" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0;background:var(--bg-page);}
.wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:20px 24px;}
.sw{border-radius:12px;height:72px;border:1px solid var(--border-default);display:flex;align-items:flex-end;padding:8px 10px;box-sizing:border-box;}
.sw span{font-size:12px;font-variant-numeric:tabular-nums;}
.cap{grid-column:1/-1;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.cap div{font-size:12px;color:var(--text-body);padding:0 2px;}
</style></head><body><div class="wrap">
  <div class="sw" style="background:var(--color-teal);"><span style="color:var(--color-cream);">#1A5653</span></div>
  <div class="sw" style="background:var(--color-teal-hover);"><span style="color:var(--color-cream);">#154744</span></div>
  <div class="sw" style="background:var(--color-teal-pressed);"><span style="color:var(--color-cream);">#103A37</span></div>
  <div class="sw" style="background:var(--color-teal-tint);"><span style="color:var(--color-teal);">#E8F0EF</span></div>
  <div class="cap"><div>Teal — primary, success</div><div>Hover</div><div>Pressed</div><div>Tint — selected states</div></div>
</div></body></html>
