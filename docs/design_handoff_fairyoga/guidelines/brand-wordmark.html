<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Wordmark" subtitle="Georgia regular, near-black; period at 125% in teal — gold when reversed" viewport="700x230" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0;background:var(--bg-page);}
.wrap{padding:24px;display:flex;flex-direction:column;gap:12px;}
.panels{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.panel{display:flex;align-items:center;justify-content:center;padding:28px 24px;}
</style></head><body><div class="wrap">
  <div class="panels">
    <div class="panel" style="background:var(--color-sand);">
      <img src="../assets/logo-outline.svg" alt="fair.yoga" style="height:36px;">
    </div>
    <div class="panel" style="background:var(--color-teal);">
      <img src="../assets/logo-reversed-outline.svg" alt="fair.yoga" style="height:36px;">
    </div>
  </div>
  <span class="type-caption">Wordmark only, no symbol. Georgia regular, ink; the period is 125% size in teal (gold on teal surfaces). Outlined paths — self-contained, renders identically everywhere. Live-text versions: logo.svg / logo-reversed.svg.</span>
</div></body></html>
