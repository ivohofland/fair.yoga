<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Elevation" subtitle="Depth = sand on cream + 1px border; shadow on sheets only" viewport="700x160" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0;background:var(--bg-page);}
.wrap{padding:20px 24px;display:flex;gap:24px;align-items:center;}
.item{display:flex;flex-direction:column;gap:8px;}
.item span{font-size:12px;color:var(--text-body);}
</style></head><body><div class="wrap">
  <div class="item"><div style="width:180px;height:72px;background:var(--surface-card);border:1px solid var(--border-default);border-radius:16px;"></div><span>card — sand + border, no shadow</span></div>
  <div class="item"><div style="width:180px;height:72px;background:var(--surface-selected);border-radius:16px;"></div><span>selected — teal tint</span></div>
  <div class="item"><div style="width:180px;height:72px;background:var(--bg-page);border-radius:16px;box-shadow:var(--shadow-sheet);"></div><span>sheet/modal — the only shadow</span></div>
</div></body></html>
