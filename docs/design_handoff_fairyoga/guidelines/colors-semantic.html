<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Semantic — gold, danger" subtitle="Attention is gold; error is muted, never filled" viewport="700x150" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0;background:var(--bg-page);}
.wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:20px 24px;}
.sw{border-radius:12px;height:72px;border:1px solid var(--border-default);display:flex;align-items:flex-end;padding:8px 10px;box-sizing:border-box;}
.sw span{font-size:12px;font-variant-numeric:tabular-nums;}
.cap{grid-column:1/-1;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.cap div{font-size:12px;color:var(--text-body);}
</style></head><body><div class="wrap">
  <div class="sw" style="background:var(--color-gold);"><span style="color:var(--color-ink);">#C4A96A</span></div>
  <div class="sw" style="background:var(--color-brown-light);"><span style="color:var(--color-cream);">#71645A</span></div>
  <div class="sw" style="background:var(--danger);"><span style="color:var(--color-cream);">#A24E4E</span></div>
  <div class="sw" style="background:var(--danger-tint);"><span style="color:var(--danger);">#F5E9E9</span></div>
  <div class="cap"><div>Gold — attention, decorative only</div><div>Brown light — placeholders</div><div>Danger — outlines/text only</div><div>Danger tint — error fields</div></div>
</div></body></html>
