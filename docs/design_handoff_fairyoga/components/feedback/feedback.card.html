<!DOCTYPE html>
<!-- @dsCard group="Components" name="Sheet / modal" subtitle="Bottom sheet with drag handle; ink-40% scrim; the system's only shadow" viewport="700x340" -->
<html><head><meta charset="utf-8"><title>Sheet</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0;background:var(--bg-page);}
  .stage{position:relative;height:340px;overflow:hidden;background:var(--bg-page);}
  .scrim{position:absolute;inset:0;background:var(--scrim);display:flex;align-items:flex-end;}
  .sheet{background:var(--bg-page);border-radius:20px 20px 0 0;box-shadow:var(--shadow-sheet);width:100%;max-width:420px;margin:0 auto;padding:0 20px 20px;box-sizing:border-box;}
  .handle{width:36px;height:4px;border-radius:2px;background:var(--border-default);margin:10px auto 12px;}
  .btn{height:48px;border-radius:999px;font-family:var(--font-body);font-size:16px;font-weight:600;width:100%;margin-top:12px;border:1.5px solid transparent;background:transparent;}
</style></head>
<body>
<div class="stage">
  <div class="scrim">
    <div class="sheet">
      <div class="handle"></div>
      <div class="type-subtitle">Cancel this class?</div>
      <p class="type-body" style="margin:8px 0 4px;">7 registered students will be notified.</p>
      <button class="btn" style="border-color:var(--danger);color:var(--danger);">Cancel class</button>
      <button class="btn" style="color:var(--color-teal);">Keep class</button>
    </div>
  </div>
</div>
</body></html>
