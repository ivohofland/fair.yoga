<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Primary palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  :root { --oldstyle: "onum" 1, "kern" 1; }
  html,body{margin:0;background:var(--bg-page);font-family:var(--font-body);color:var(--fy-dark);}
  .wrap{padding:32px 24px;max-width:680px;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0;border-top:1px solid var(--fy-border);}
  .sw{display:flex;align-items:flex-start;gap:14px;padding:16px 0;border-bottom:1px solid var(--fy-border);}
  .sw:nth-child(odd){padding-right:16px;}
  .sw:nth-child(even){padding-left:16px;border-left:1px solid var(--fy-border);}
  .chip{width:44px;height:44px;flex:none;border:1px solid var(--fy-border);}
  .name{font-family:var(--font-heading);font-style:italic;font-size:15px;color:var(--fy-dark);font-feature-settings:var(--oldstyle);}
  .hex{font-size:12px;color:var(--fy-brown);margin-top:2px;font-feature-settings:var(--oldstyle);}
  .role{font-family:var(--font-heading);font-style:italic;font-size:12px;color:var(--fy-brown);margin-top:2px;font-feature-settings:var(--oldstyle);}
  .colophon{margin-top:14px;text-align:right;font-family:var(--font-heading);font-style:italic;font-size:12px;color:var(--fy-brown);opacity:0.75;}
</style></head>
<body><div class="wrap">
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#1A5653"></div><div><div class="name">Deep Teal</div><div class="hex">#1A5653</div><div class="role">reserved for money — and the wordmark</div></div></div>
    <div class="sw"><div class="chip" style="background:#C4A96A"></div><div><div class="name">Muted Gold</div><div class="hex">#C4A96A</div><div class="role">rare accent — not in active use</div></div></div>
    <div class="sw"><div class="chip" style="background:#B85C5C"></div><div><div class="name">Warm Red</div><div class="hex">#B85C5C</div><div class="role">errors only — never decorative</div></div></div>
    <div class="sw"><div class="chip" style="background:#E8F0EF"></div><div><div class="name">Light Teal</div><div class="hex">#E8F0EF</div><div class="role">selected tint — list rows</div></div></div>
  </div>
  <div class="colophon">Teal is a moment, not a theme — see the currency rule</div>
</div></body></html>
