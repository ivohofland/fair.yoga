<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-page);font-family:var(--font-body);color:var(--fy-dark);}
  .wrap{padding:32px 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;max-width:640px;}
  button{font-family:var(--font-body);font-weight:500;font-size:16px;padding:12px 24px;min-height:44px;border:none;background:transparent;cursor:pointer;border-radius:0;}
  .p{background:var(--fy-brown);color:var(--fy-cream);}
  .s{border:1px solid var(--fy-brown);color:var(--fy-brown);}
  .g{color:var(--fy-brown);text-decoration:underline;text-decoration-thickness:0.5px;text-underline-offset:3px;}
  .d{border:1px solid var(--fy-error);color:var(--fy-error);}
  .dis{opacity:.5;cursor:not-allowed;}
  .colophon{margin-top:14px;text-align:right;font-family:var(--font-heading);font-style:italic;font-size:12px;color:var(--fy-brown);opacity:0.75;width:100%;}
</style></head>
<body><div class="wrap">
  <button class="p">Create class</button>
  <button class="s">Back</button>
  <button class="g">Cancel</button>
  <button class="d">Delete room</button>
  <button class="p dis">Sending…</button>
  <div class="colophon">primary · secondary · ghost · destructive · disabled — flat, 44 px min, sentence case</div>
</div></body></html>
