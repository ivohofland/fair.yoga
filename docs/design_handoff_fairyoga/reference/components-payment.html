<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Payment checklist</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  :root { --oldstyle: "onum" 1, "kern" 1; }
  html,body{margin:0;background:var(--bg-page);font-family:var(--font-body);}
  .wrap{padding:32px 24px;max-width:520px;}
  .row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--fy-border);gap:16px;}
  .name{color:var(--fy-dark);font-size:15px;font-weight:500;}
  .amt{color:var(--fy-teal);font-size:15px;font-weight:600;display:block;font-feature-settings:"tnum" 1,"lnum" 1;margin-top:2px;}
  .btn{min-width:44px;min-height:44px;padding:8px 16px;font-size:14px;font-weight:500;border-radius:8px;border:1px solid var(--fy-brown);background:transparent;color:var(--fy-brown);cursor:pointer;font-family:var(--font-body);}
  .paid{background:var(--fy-brown);color:var(--fy-cream);border-color:var(--fy-brown);}
  .colophon{margin-top:14px;text-align:right;font-family:var(--font-heading);font-style:italic;font-size:12px;color:var(--fy-brown);opacity:0.75;}
</style></head>
<body><div class="wrap">
  <div class="row"><div><span class="name">Anna K.</span><span class="amt">€&nbsp;14.00</span></div><button class="btn paid">Paid</button></div>
  <div class="row"><div><span class="name">Ben M.</span><span class="amt">€&nbsp;17.50</span></div><button class="btn">Mark paid</button></div>
  <div class="row" style="border-bottom:none;"><div><span class="name">Clara V.</span><span class="amt">€&nbsp;10.00</span></div><button class="btn">Mark paid</button></div>
  <div class="colophon">Payment checklist · only rounded buttons in the system · amount in teal</div>
</div></body></html>
