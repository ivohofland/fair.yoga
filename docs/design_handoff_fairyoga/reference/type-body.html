<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Body type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  :root { --oldstyle: "onum" 1, "kern" 1; }
  html,body{margin:0;background:var(--bg-page);color:var(--fy-dark);}
  .wrap{padding:32px 24px;font-family:var(--font-body);max-width:520px;}
  .body{font-size:16px;color:var(--fy-brown);line-height:1.6;}
  .label{font-size:14px;color:var(--fy-brown);margin-top:24px;}
  .hint{font-size:12px;color:var(--fy-brown);margin-top:16px;font-feature-settings:var(--oldstyle);}
  .colophon{margin-top:6px;font-family:var(--font-heading);font-style:italic;font-size:12px;color:var(--fy-brown);opacity:0.75;font-feature-settings:var(--oldstyle);}
</style></head>
<body><div class="wrap">
  <p class="body">Your price is based on what you can comfortably contribute. Here's how that works.</p>
  <div class="colophon">Body · Atkinson Hyperlegible 16 px / 1.6 · earth brown</div>

  <div class="label">Cancellation deadline</div>
  <div class="colophon">Label · 14 px · earth brown</div>

  <div class="hint">Based on 7 registered students</div>
  <div class="colophon">Hint · 12 px · old-style figures · earth brown</div>
</div></body></html>
