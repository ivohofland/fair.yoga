services:
  db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ethical_yoga
      POSTGRES_USER: yoga
      POSTGRES_PASSWORD: yoga_dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U yoga -d ethical_yoga']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
