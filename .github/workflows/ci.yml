name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ethical_yoga
          POSTGRES_USER: yoga
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://yoga:test_password@localhost:5432/ethical_yoga
      PASSKEY_RP_ID: localhost
      PASSKEY_RP_NAME: fair.yoga
      CRON_SECRET: ci-cron-secret
      RESEND_API_KEY: re_test
      EMAIL_FROM: noreply@test.local
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      # Fails when schema.prisma and the migration history disagree —
      # catches migrations amended after being applied, and schema edits
      # committed without a migration.
      - name: Check schema/migration drift
        run: npx prisma migrate diff --from-schema-datasource prisma/schema.prisma --to-schema-datamodel prisma/schema.prisma --exit-code

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      # Visible but non-blocking: the current high advisories live in
      # next/vite themselves with no compatible fix released yet.
      - name: Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: npm run build

      # Integration tests hit the HTTP API, so the built app must be running.
      - name: Run tests
        run: |
          npm run start &
          for i in {1..30}; do
            curl -sf http://localhost:3000/login > /dev/null && break
            sleep 1
          done
          npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # The app from the test step is still listening; playwright.config
      # reuses an existing server on :3000.
      - name: End-to-end tests
        run: npx playwright test
