# Production stack for a single VPS: Postgres + migrations + app.
# Nginx (host-level) terminates TLS and proxies to 127.0.0.1:3000 —
# see deploy/nginx.conf.example and DEPLOYMENT.md.
#
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fairyoga}
      POSTGRES_USER: ${POSTGRES_USER:-fairyoga}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No published ports: the database is reachable only on the compose
    # network. Backups go through `docker compose exec` (deploy/backup.sh).
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-fairyoga} -d $${POSTGRES_DB:-fairyoga}']
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fairyoga}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-fairyoga}
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fairyoga}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-fairyoga}
    ports:
      # Bound to localhost only — nginx is the public face.
      - '127.0.0.1:3000:3000'
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
